<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Glossaire équestre — Dicocheval</title><style>body{margin:0;background:#fafaf6;color:#24324d;font:15px Arial;line-height:1.6}.wrap{max-width:1000px;margin:auto;padding:0 24px}header{background:linear-gradient(115deg,#234238,#b58a4b);color:#fff;padding:55px 0}h1,h2{font-family:Georgia;margin:0}h1{font-size:52px}.back{color:#fff;text-decoration:none;font-weight:bold}.tools{padding:25px 0;position:sticky;top:0;background:#fafaf6}.tools input{width:100%;padding:14px;border:1px solid #ced9cf;border-radius:7px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding-bottom:50px}.term{background:white;border-left:4px solid #b58a4b;padding:16px;border-radius:6px}.term b{color:#234238}.count{color:#63756a;font-size:13px}@media(max-width:600px){h1{font-size:39px}.grid{grid-template-columns:1fr}}</style></head><body><header><div class="wrap"><a class="back" href="index.html">← Retour au site</a><h1>Glossaire équestre</h1><p>Plus de 100 termes pour apprendre sans se perdre.</p></div></header><main class="wrap"><div class="tools"><input id="search" placeholder="Rechercher un mot dans le glossaire…"><p class="count" id="count"></p></div><div class="grid" id="grid"></div></main><script>const terms=[['Abreuvoir','Récipient ou dispositif qui fournit de l’eau au cheval.'],['Aide','Action du cavalier pour communiquer une demande au cheval.'],['Alezan','Robe fauve avec des crins de même couleur ou plus clairs.'],['Amble','Déplacement particulier où les membres du même côté avancent ensemble.'],['Anneau','Pièce métallique servant à fixer une sangle ou une rêne.'],['Antérieur','Membre avant du cheval.'],['Appui','Contact plus ou moins soutenu du cheval sur la main du cavalier.'],['Attelage','Discipline où le cheval tire une voiture.'],['Balzane','Marque blanche sur le bas d’un membre.'],['Bardette','Petite selle adaptée aux jeunes enfants.'],['Barrage','Deuxième parcours pour départager des concurrents.'],['Bai','Robe brune avec crins noirs.'],['Bande de repos','Protection souple posée sur les membres au repos.'],['Bombe','Ancien nom du casque d’équitation.'],['Box','Espace individuel fermé où loge un cheval.'],['Bride','Ensemble de pièces sur la tête, comprenant notamment le mors et les rênes.'],['Bridon','Filet simple utilisé pour diriger le cheval.'],['Cale-pied','Élément empêchant le pied de glisser trop loin dans l’étrier.'],['Carrière','Terrain extérieur destiné au travail monté.'],['Cavalier','Personne qui monte ou conduit un cheval.'],['Caveçon','Licol renforcé servant au travail à pied.'],['Chanfrein','Partie du visage entre le front et les naseaux.'],['Cheval de trait','Cheval sélectionné pour tirer de lourdes charges.'],['Cloches','Protections placées autour du sabot.'],['Colique','Douleur abdominale nécessitant une attention rapide.'],['Concours complet','Épreuve réunissant dressage, cross et saut.'],['Cordelette','Lien posé autour de l’encolure pour communiquer.'],['Cravache','Petite badine utilisée avec mesure comme aide.'],['Crinière','Poils longs situés sur le haut de l’encolure.'],['Croupe','Partie arrière du cheval au-dessus de la queue.'],['Cure-pied','Outil servant à retirer les saletés du sabot.'],['Débourrage','Début de l’éducation d’un jeune cheval.'],['Demi-pension','Partage des frais et du temps de monte d’un cheval.'],['Dentiste équin','Professionnel qui entretient la bouche du cheval.'],['Départ au galop','Demande de commencer le galop.'],['Dressage','Discipline de précision et de communication.'],['Écurie','Lieu où sont hébergés les chevaux.'],['Embouchure','Partie du matériel placée dans la bouche du cheval.'],['Encolure','Zone entre la tête et le garrot.'],['Endurance','Discipline de longue distance.'],['Éperon','Aide fixée à la botte, à employer avec finesse.'],['Étrier','Appui pour le pied du cavalier.'],['Étrille','Brosse ronde qui décolle la poussière.'],['Ferrure','Pose de fers sur les sabots.'],['Filet','Bridon avec mors et rênes.'],['Foie','Organe interne qui participe à la digestion.'],['Foin','Fourrage sec de base.'],['Fourbure','Atteinte douloureuse du pied.'],['Fourchette','Partie souple sous le sabot.'],['Galop','Déplacement rapide du cheval.'],['Garrot','Point haut entre l’encolure et le dos.'],['Genou','Articulation de l’antérieur.'],['Gogue','Enrênement de travail.'],['Gourmette','Chaînette associée à certains mors.'],['Graisse à pied','Produit d’entretien externe du sabot.'],['Groom','Personne qui prépare et soigne les chevaux.'],['Guêtre','Protection des membres.'],['Hackamore','Bridon sans mors agissant sur le chanfrein.'],['Harnachement','Ensemble des équipements du cheval.'],['Hongre','Cheval mâle castré.'],['Incurvation','Pli léger du corps autour de la jambe intérieure.'],['Jument','Cheval femelle adulte.'],['Licol','Équipement pour mener ou attacher le cheval.'],['Longer','Faire travailler un cheval au bout d’une longe.'],['Longe','Longue sangle utilisée au travail à pied.'],['Mangeoire','Récipient contenant la nourriture.'],['Manège','Espace couvert réservé au travail.'],['Maréchal-ferrant','Professionnel des pieds et des fers.'],['Martingale','Enrênement qui limite certains mouvements de tête.'],['Mors','Pièce placée dans la bouche pour communiquer.'],['Museau','Extrémité du nez du cheval.'],['Naseau','Ouverture nasale du cheval.'],['Ostéopathe équin','Praticien qui travaille sur la mobilité.'],['Paddock','Petit espace extérieur clôturé.'],['Pansage','Nettoyage et inspection du cheval.'],['Pareur','Professionnel qui entretient les pieds sans forcément ferrer.'],['Parage','Entretien de la forme du sabot.'],['Pas','Déplacement lent à quatre temps.'],['Pension','Hébergement et soins du cheval dans une écurie.'],['Pied','Extrémité du membre comprenant le sabot.'],['Poitrail','Avant du thorax.'],['Poney','Équin de taille réduite selon les classifications.'],['Poulain','Jeune cheval.'],['Prise de rênes','Façon de tenir les rênes.'],['Quartier','Partie latérale du sabot.'],['Reculer','Déplacement du cheval vers l’arrière.'],['Rêne','Lanière reliant la main au filet.'],['Reprise','Enchaînement de figures imposées.'],['Robe','Couleur du poil, des crins et de la peau.'],['Sangle','Pièce qui maintient la selle.'],['Selle','Siège du cavalier sur le dos.'],['Selle mixte','Selle polyvalente pour plusieurs activités.'],['Shetland','Petit poney très robuste.'],['Sol','Surface sur laquelle travaille le cheval.'],['Sous-gorge','Partie du filet sous la gorge.'],['Tapis de selle','Protection placée sous la selle.'],['Têtière','Partie du filet derrière les oreilles.'],['Tondeuse','Outil qui coupe le poil en hiver.'],['Trot','Déplacement à deux temps.'],['Vermifuge','Traitement contre certains parasites internes.'],['Vétérinaire','Médecin des animaux.'],['Voltige','Discipline de gymnastique à cheval.'],['Voltigeur','Personne qui pratique la voltige.'],['Western','Style d’équitation issu du travail de ranch.'],['Withers','Mot anglais pour garrot.'],['Zone de confort','Distance où le cheval se sent en sécurité.']];function draw(){let s=search.value.toLowerCase();let a=terms.filter(t=>t.join(' ').toLowerCase().includes(s));grid.innerHTML=a.map(t=>`<article class="term"><b>${t[0]}</b><br>${t[1]}</article>`).join('');count.textContent=a.length+' termes affichés sur '+terms.length;}search.oninput=draw;draw();</script><script src="glossary-page.js"></script></body></html>
