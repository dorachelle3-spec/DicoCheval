<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Discussion — DicoCheval</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>body{margin:0;background:#f6f2e9;color:#19372f;font-family:Arial,sans-serif}.page{width:min(850px,calc(100% - 32px));margin:40px auto}.back{color:#234238;font-weight:700;text-decoration:none}.card{background:#fffdf8;border:1px solid #dce5dc;border-radius:14px;padding:22px;margin:18px 0}.reply{margin-left:28px;border-left:4px solid #b58a4b}.meta{font-size:13px;color:#5b6e65}.official{display:inline-block;background:#234238;color:#fff;border-radius:99px;padding:3px 7px;font-size:11px;font-weight:bold}.avatar{width:34px;height:34px;border-radius:50%;display:inline-grid;place-items:center;background:#dfe9df;font-weight:bold;margin-right:8px;vertical-align:middle}.form{display:grid;gap:9px}.form textarea{min-height:100px;padding:10px;border:1px solid #cbd8ce;border-radius:7px;font:15px Arial}.btn{background:#234238;color:white;border:0;border-radius:7px;padding:10px 14px;cursor:pointer;width:max-content}.info{color:#586d63;font-size:13px}</style>
</head><body><main class="page"><a class="back" href="index.html#actualites">← Retour aux actualités</a><h1>Discussion</h1><div id="thread"><p class="info">Chargement de la discussion…</p></div></main>
<script>
(() => {
const db=window.supabase.createClient('https://mmxdlnfntpufwwkdvgzc.supabase.co','sb_publishable_Pa-DX3nwNTZktbWK46KDQg_IuIy8TZP');
const owner='f22161e4-7528-4fd2-9860-a18be084b1f6',id=new URLSearchParams(location.search).get('comment');
const esc=value=>String(value||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[c]));
const date=value=>new Intl.DateTimeFormat('fr-CA',{day:'numeric',month:'long',year:'numeric'}).format(new Date(value));
function card(c,reply=false){const official=c.auteur_id===owner;return `<article class="card ${reply?'reply':''}"><span class="avatar">${official?'D':esc((c.pseudo||'V')[0].toUpperCase())}</span>${official?'<span class="official">DicoCheval · Propriétaire</span>':`<b>${esc(c.pseudo||'Visiteur')}</b>`}<p class="meta">${date(c.cree_le)}</p><div>${esc(c.contenu)}</div></article>`}
async function notify(recipient,text,commentId){if(!recipient)return;const {data:{user}}=await db.auth.getUser();if(!user||recipient===user.id)return;await db.from('notifications').insert({destinataire_id:recipient,expediteur_id:user.id,texte:text,commentaire_id:commentId})}
async function load(){if(!id){document.getElementById('thread').innerHTML='<p class="info">Discussion introuvable.</p>';return}const {data:root,error}=await db.from('commentaires').select('*').eq('id',id).single();if(error||!root){document.getElementById('thread').innerHTML='<p class="info">Discussion introuvable.</p>';return}const {data:replies}=await db.from('commentaires').select('*').eq('parent_id',id).order('cree_le',{ascending:true});const {data:{user}}=await db.auth.getUser();document.getElementById('thread').innerHTML=card(root)+(replies||[]).map(reply=>card(reply,true)).join('')+(user?'<section class="card"><h2>Répondre</h2><form class="form" id="replyForm"><textarea id="replyText" maxlength="500" placeholder="Écris ta réponse…"></textarea><p class="info">Pour prévenir quelqu’un, écris @ suivi de son pseudo dans ton message.</p><button class="btn">Publier</button><p id="formInfo" class="info"></p></form></section>':'<section class="card"><p>Connecte-toi depuis la page d’accueil pour répondre à cette discussion.</p></section>');document.getElementById('replyForm')?.addEventListener('submit',async e=>{e.preventDefault();const text=document.getElementById('replyText').value.trim(),info=document.getElementById('formInfo');if(!text)return;info.textContent='Publication…';const pseudo=user.id===owner?'DicoCheval':(user.user_metadata?.pseudo||'Visiteur');const {data:created,error:sendError}=await db.from('commentaires').insert({actualite_id:root.actualite_id,auteur_id:user.id,pseudo,avatar_url:user.user_metadata?.avatar_url||null,contenu:text,parent_id:root.id}).select().single();if(sendError){info.textContent='Impossible de publier cette réponse.';return}await notify(root.auteur_id,`${pseudo} a répondu à ton commentaire.`,created.id);const mentioned=(text.match(/@([\p{L}\p{N}_-]+)/gu)||[]).map(x=>x.slice(1).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase());if(mentioned.length){const {data:people}=await db.from('commentaires').select('auteur_id,pseudo').eq('actualite_id',root.actualite_id);for(const person of people||[]){const name=String(person.pseudo||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9_-]/g,'');if(mentioned.includes(name))await notify(person.auteur_id,`${pseudo} t’a mentionné·e dans une discussion.`,created.id)}}load()})}
load();
})();
</script>
<style id="mentionAutocompleteStyle">#replyForm{position:relative}#mentionSuggestions{display:none;position:absolute;left:0;right:0;top:108px;z-index:10;background:#fffdf8;border:1px solid #b7cabe;border-radius:8px;box-shadow:0 8px 22px #19372f22;overflow:hidden}#mentionSuggestions.open{display:block}#mentionSuggestions button{display:block;width:100%;border:0;background:transparent;text-align:left;padding:10px 12px;color:#19372f;cursor:pointer;font:14px Arial}#mentionSuggestions button:hover{background:#e8f0e9}.mention-helper{font-size:12px;color:#63756a;margin:0}</style>
<script id="mentionAutocomplete">
(()=>{const db=window.supabase.createClient('https://mmxdlnfntpufwwkdvgzc.supabase.co','sb_publishable_Pa-DX3nwNTZktbWK46KDQg_IuIy8TZP');const norm=v=>String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase(),esc=v=>String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));let bound=false;async function setup(){const area=document.getElementById('replyText');if(!area||bound)return;bound=true;const articleId=new URLSearchParams(location.search).get('comment');const root=await db.from('commentaires').select('actualite_id').eq('id',articleId).single();if(root.error)return;const result=await db.from('commentaires').select('pseudo').eq('actualite_id',root.data.actualite_id);const people=[...new Map((result.data||[]).filter(p=>p.pseudo).map(p=>[norm(p.pseudo),p.pseudo])).values()];const list=document.createElement('div');list.id='mentionSuggestions';area.after(list);const hint=document.createElement('p');hint.className='mention-helper';hint.textContent='Tape @ puis le début d’un pseudo pour le choisir dans la liste.';list.after(hint);let active='';const close=()=>{list.classList.remove('open');list.innerHTML=''};area.addEventListener('input',()=>{const before=area.value.slice(0,area.selectionStart),match=before.match(/(^|\s)@([\p{L}\p{N}_-]*)$/u);if(!match||!match[2])return close();const choices=people.filter(p=>norm(p).startsWith(norm(match[2]))).slice(0,7);if(!choices.length)return close();active=match[0];list.innerHTML=choices.map(p=>'<button type="button" data-pseudo="'+esc(p)+'">@'+esc(p)+'</button>').join('');list.classList.add('open');list.querySelectorAll('button').forEach(b=>b.onclick=()=>{const beforeText=area.value.slice(0,area.selectionStart),afterText=area.value.slice(area.selectionStart),mention=active.replace(/@[^\s]*$/,'@'+b.dataset.pseudo+' ');area.value=beforeText.slice(0,-active.length)+mention+afterText;area.focus();area.selectionStart=area.selectionEnd=beforeText.length-active.length+mention.length;close()})});area.addEventListener('blur',()=>setTimeout(close,140))}const watcher=new MutationObserver(setup);watcher.observe(document.getElementById('thread'),{childList:true,subtree:true});setup()})();
</script>
</body></html>
