<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Anatomie du cheval — Dicocheval</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"><style>body{margin:0;background:#fafaf6;color:#24362e;font:15px/1.6 'DM Sans',Arial}.wrap{max-width:1050px;margin:auto;padding:0 24px}header{background:linear-gradient(120deg,#1b352d,#426756,#b58a4b);color:white;padding:56px 0}h1,h2{font-family:'Playfair Display',Georgia;margin:0}h1{font-size:50px}.back{color:white;text-decoration:none;font-weight:bold}.tools{padding:22px 0;position:sticky;top:0;background:#fafaf6}.tools input{width:100%;padding:14px;border:1px solid #ced9cf;border-radius:7px;font:15px 'DM Sans'}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;padding-bottom:50px}.part{background:white;border-left:4px solid #b58a4b;padding:17px;border-radius:7px}.part b{color:#234238}.count{color:#63756a;font-size:13px}@media(max-width:600px){h1{font-size:38px}.grid{grid-template-columns:1fr}}</style></head><body><header><div class="wrap"><a class="back" href="index.html">← Retour à Dicocheval</a><h1>Anatomie du cheval</h1><p>Un guide complet des parties externes du corps du cheval.</p></div></header><main class="wrap"><div class="tools"><input id="search" placeholder="Rechercher une partie du corps…"><p class="count" id="count"></p></div><div id="grid" class="grid"></div></main><script>const p=[['Tête','Partie avant qui contient le cerveau, les yeux, les oreilles et la bouche.'],['Front','Zone située entre les deux oreilles et au-dessus des yeux.'],['Oreilles','Elles aident le cheval à entendre et expriment souvent son état émotionnel.'],['Œil','Organe de la vision, placé sur le côté de la tête.'],['Chanfrein','Partie du visage entre le front et les naseaux.'],['Naseaux','Ouvertures du nez par lesquelles le cheval respire.'],['Museau','Extrémité souple du nez et de la bouche.'],['Lèvres','Parties mobiles utilisées pour attraper la nourriture.'],['Bouche','Contient les dents, la langue et le mors lorsqu’il est utilisé.'],['Menton','Partie sous la bouche.'],['Ganache','Zone osseuse sous la joue, derrière la mandibule.'],['Nuque','Jonction entre la tête et l’encolure, derrière les oreilles.'],['Encolure','Partie du cou reliant la tête au tronc.'],['Crinière','Poils longs sur le haut de l’encolure.'],['Garrot','Point haut entre l’encolure et le dos ; il sert à mesurer le cheval.'],['Épaule','Zone à l’avant du tronc, liée au mouvement du membre avant.'],['Poitrail','Avant du thorax, entre les deux antérieurs.'],['Thorax','Partie du corps qui abrite le cœur et les poumons.'],['Côtes','Os qui forment la cage thoracique.'],['Dos','Zone entre le garrot et les reins, où se place la selle.'],['Reins','Partie située après le dos et avant la croupe.'],['Flanc','Côté du ventre, derrière les côtes.'],['Ventre','Partie inférieure de l’abdomen.'],['Passage de sangle','Zone derrière les antérieurs où passe la sangle.'],['Croupe','Partie arrière du corps, avant l’attache de la queue.'],['Hanche','Pointe osseuse de chaque côté de l’arrière-main.'],['Fesse','Partie musclée à l’arrière de la cuisse.'],['Queue','Prolongement arrière qui sert notamment à chasser les insectes.'],['Attache de queue','Point où la queue rejoint la croupe.'],['Membre antérieur','Jambe avant du cheval.'],['Bras','Partie haute de l’antérieur, entre l’épaule et le coude.'],['Coude','Articulation de l’antérieur placée près du thorax.'],['Avant-bras','Partie entre le coude et le genou.'],['Genou','Articulation de l’antérieur, correspondant au carpe.'],['Canon antérieur','Segment long et droit entre le genou et le boulet.'],['Boulet antérieur','Articulation au-dessus du sabot.'],['Paturon','Partie oblique entre le boulet et la couronne.'],['Couronne','Zone entre le paturon et le sabot.'],['Sabot','Enveloppe dure qui protège l’extrémité du pied.'],['Membre postérieur','Jambe arrière du cheval.'],['Cuisse','Partie haute et très musclée du postérieur.'],['Grasset','Articulation du postérieur comparable au genou humain.'],['Jambe','Segment entre le grasset et le jarret.'],['Jarret','Grande articulation du postérieur, comparable à la cheville.'],['Canon postérieur','Segment entre le jarret et le boulet.'],['Boulet postérieur','Articulation située au-dessus du pied arrière.'],['Pied','Ensemble formé par le sabot et les structures internes.'],['Fourchette','Partie souple sous le sabot qui participe à l’amortissement.'],['Sole','Face inférieure du sabot autour de la fourchette.'],['Talons','Partie arrière du sabot.']];function draw(){let s=search.value.toLowerCase();let a=p.filter(x=>x.join(' ').toLowerCase().includes(s));grid.innerHTML=a.map(x=>`<article class="part"><b>${x[0]}</b><br>${x[1]}</article>`).join('');count.textContent=a.length+' parties affichées sur '+p.length;}search.oninput=draw;draw();</script><script src="anatomy-page.js"></script></body></html>
